  <text x="80" y="455" fill="#9a9ab0" font-family="system-ui, -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="28">在噪声中提取结构，在结构中形成判断</text>

  <!-- 底部关键词 -->
