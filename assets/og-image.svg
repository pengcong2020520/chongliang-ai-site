  <!-- 深色背景 -->
  <rect width="1200" height="630" fill="#1a1a2e"/>

  <!-- 左侧红色装饰条 -->
  <rect x="0" y="0" width="8" height="630" fill="#e94560"/>

  <!-- 顶部标签 -->
  <rect x="80" y="70" width="200" height="40" rx="20" fill="#e94560" opacity="0.15"/>
  <text x="180" y="97" fill="#e94560" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" text-anchor="middle">CHONGLIANG AI</text>

  <!-- 主标题 -->
  <text x="80" y="250" fill="#ffffff" font-family="system-ui, -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="72" font-weight="700">冲量 AI</text>

  <!-- 副标题 -->
  <text x="80" y="330" fill="#e0e0e8" font-family="system-ui, -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif" font-size="40" font-weight="500">AI 产品经理入门知识库</text>

  <!-- 分隔线 -->
  <line x1="80" y1="400" x2="680" y2="400" stroke="#2a2a4e" stroke-width="2"/>

