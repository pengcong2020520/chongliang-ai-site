    .mono { font-family: "IBM Plex Mono", monospace; font-size: 14px; fill: #8b8b84; }
    .node { fill: #ffffff; stroke: #d8d8d2; stroke-width: 2; }
    .node-soft { fill: #f2f2ef; stroke: #c9c9c2; stroke-width: 2; }
    .line { fill: none; stroke: #c9c9c2; stroke-width: 2; }
    .accent { stroke: #315a9f; }
    .concept { stroke: #4f6f64; }
  </style>
